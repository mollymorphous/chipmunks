[project]
name = "chipmunks-api"
version = "0.1.0"
description = "Cute little inventory manager"
readme = "../README.md"
license = "MIT"
classifiers = [
    "Private :: Do Not Upload"
]
authors = [
    "Molly Rose",
    "Jess Muskin-Pierret",
]
requires-python = ">=3.13"
dependencies = [
    "asyncpg>=0.30.0",
    "fastapi>=0.115.8",
    "granian>=1.7.6",
    "pydantic>=2.10.6",
    "pydantic-settings>=2.8.1",
    "sqlalchemy[asyncio]>=2.0.38",
    "sqlmodel>=0.0.24",
]

[dependency-groups]
dev = [
    "aiosqlite>=0.21.0",
    "ruff>=0.9.7",
]
