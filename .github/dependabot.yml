# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
enable-beta-ecosystems: true
updates:
  - package-ecosystem: uv
    directory: /api/
    schedule:
      interval: weekly
      day: friday
    groups:
      minor-updates:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /web/
    schedule:
      interval: weekly
      day: friday
    groups:
      minor-updates:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directories:
      - /web/
      - /api/
    schedule:
      interval: weekly
      day: friday
    groups:
      patch-updates:
        update-types:
          - patch

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
      day: friday
    groups:
      patch-updates:
        update-types:
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
