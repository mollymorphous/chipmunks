# Continuous Integration for the API module

name: "API"

on:
  push:
    branches: [main]
    paths: ["api/**", ".github/workflows/api.yml"]
  pull_request:
    branches: [main]
    paths: ["api/**", ".github/workflows/api.yml"]

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Lint
        uses: astral-sh/ruff-action@v3
        with:
          src: ./api
          args: check
          version-file: ./api/pyproject.toml
      - name: Format
        uses: astral-sh/ruff-action@v3
        with:
          src: ./api
          args: format --check
          version-file: ./api/pyproject.toml

  mypy:
    name: Mypy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "./api/.python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "./api/uv.lock"
      - name: Sync dependencies
        working-directory: ./api/
        run: uv sync --frozen --no-dev --group mypy
      - name: Run mypy
        working-directory: ./api/
        run: uv run --no-sync mypy app

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "./api/.python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "./api/uv.lock"
      - name: Sync dependencies
        working-directory: ./api/
        run: uv sync --frozen --no-dev --group test
      - name: Run pytest
        working-directory: ./api/
        run: uv run --no-sync pytest
