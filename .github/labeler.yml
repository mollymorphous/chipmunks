api:
  - changed-files:
      - all-globs-to-any-file: 
        - "api/*"
        - "!api/Dockerfile"

web:
  - changed-files:
      - all-glob-to-any-file:
        - "web/*"
        - "!web/Dockerfile"

docker:
  - changed-files:
    - any-glob-to-any-file: 
      - "**/Docker"
      - "compose.yaml"
